<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skate Hub - Estatísticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-md navbar-dark px-2" style="background-color: #1a1a1a;">
        <div class="container-fluid d-flex justify-content-between align-items-center flex-nowrap">
    
            <a href="index.html" class="navbar-brand fs-3 fs-md-1 fw-bold p-2 p-md-4 d-flex align-items-center" style="text-decoration: none; color: white;">
                <img src="images/logo-gato-grafismo.png" 
                     alt="Logo Skate Hub" 
                     width="100" 
                     height="100">
                    <span>SKATE HUB</span>
            </a>
            
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="text-center fw-bold mb-4 text-uppercase">Gráficos e Estatísticas do Catálogo</h1>
        <p class="text-center text-light mb-5">Análise em tempo real das manobras cadastradas no nosso banco de dados.</p>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card-grafico text-center">
                    <h5 class="fw-bold mb-3">Quantidade de Manobras por Categoria</h5>
                    <canvas id="graficoCategorias"></canvas>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card-grafico text-center">
                    <h5 class="fw-bold mb-3">Distribuição por Nível de Dificuldade</h5>
                    <canvas id="graficoDificuldade"></canvas>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-5">
            <a href="index.html" class="btn btn-outline-light">← Voltar para as Manobras</a>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
